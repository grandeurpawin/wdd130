<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="styles/table.css">
</head>
<body>
    <h2>Her</h2>
    <table>
        <caption>
        I'm confused about my feelings for her.
        </caption>
        <thead>
            <tr>
                <th scope="col">Needed</th>
                <th scope="col">Attributes</th>
                <th scope="col"> Can Work it Out?</th>
                <th scope="col">Commited?</th>
                <th scope="col">Willing</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4">Findings</th>
                <th scope="row">Patience</th>
                <td>Yes</td>
                <td>Yes</td>
                <td>Yes</td>
            </tr>
            <tr>
                <th scope="row">Virtue</th>
                <td>Yes</td>
                <td>Yes</td>
                <td>Yes</td>
            </tr>
            <tr>
                <th scope="rowgroup">Charity</th>
                <td>Yes</td>
                <td>Yes</td>
                <td>Yes</td>
            </tr>
            <tr>
                <th scope="row">Humility</th>
                <td>Yes</td>
                <td>Yes</td>
                <td>Yes</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
            <th scope="row" colspan="4">Willing to Work it Out?</th>
            <td>YES</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
